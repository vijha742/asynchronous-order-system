server:
  port: 8080

spring:
  application:
    name: order-service

  output:
    ansi:
      enabled: ALWAYS

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "*"
      auto-offset-reset: earliest

  datasource:
    url: jdbc:postgresql://localhost:5433/orderdb
    username: orderuser
    password: orderpass

    hikari:
      max-lifetime: 270000
      idle-timeout: 240000
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      leak-detection-threshold: 20000

  jpa:
    hibernate:
      ddl-auto: update

    open-in-view: false

logging:
  level:
    root: INFO
    com.vikas: DEBUG
    org.springframework: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: OFF
    org.apache.kafka.clients.producer.ProducerConfig: OFF

management:
  metrics:
    distribution.percentiles-histogram.http.server.requests: true
    tags.application: ${spring.application.name}
    export.prometheus.enabled: true
  endpoints.web.exposure.include: "*"
  endpoint:
    health.show-details: always
    prometheus.enabled: true
